<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버블로그리뷰 작성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>네이버블로그리뷰 작성기</h1>
        <nav>
            <a href="site-info.html">사이트 소개</a>
            <a href="policies.html">정책</a>
        </nav>
    </header>
    <main>
        <section id="search-section">
            <h2>네이버 블로그 검색</h2>
            <div class="search-bar">
                <label class="sr-only" for="search-input">검색어</label>
                <input type="text" id="search-input" placeholder="검색어를 입력하세요" autocomplete="off">
                <button type="button" id="search-button">검색</button>
            </div>
            <p id="search-status" class="status" aria-live="polite"></p>
            <div id="search-results" class="results"></div>
        </section>
        <section id="draft-section">
            <h2>후기 초안 만들기</h2>
            <label for="user-review" class="section-label">내 실제 후기 메모</label>
            <textarea id="user-review" rows="8" placeholder="직접 방문해서 느낀 점을 메모해 주세요. 자동으로 저장됩니다."></textarea>
            <p class="hint">메모를 자세히 적을수록 문단형 후기 글의 완성도가 높아집니다.</p>
            <div class="draft-actions">
                <button type="button" id="generate-button">글 생성</button>
                <button type="button" id="copy-button" class="secondary">복사</button>
            </div>
            <p id="draft-status" class="status" aria-live="polite"></p>
            <div id="draft-output" class="draft-output" aria-live="polite"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 네이버블로그리뷰 작성기</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
